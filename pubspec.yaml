name: bloom_cycle
description: "A private, AI-assisted period tracker with calendar insights and chatbot support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI / Icons / Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Profile photo picking (gallery/camera) — saved locally, never uploaded
  image_picker: ^1.1.2

  # Security / Lock screen
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # State management
  provider: ^6.1.2

  # Date utils
  intl: ^0.19.0

  # Chatbot networking (wired to your Firebase Function later)
  http: ^1.2.1

  # Firebase core init (required for DefaultFirebaseOptions / Cloud Functions)
  firebase_core: ^3.2.0

  # Misc
  uuid: ^4.4.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#FFF1F5"
    theme_color: "#E8A0BF"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/app_logo.png
